<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Word Counter</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300&display=swap">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: #2d3548;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px 10px 14px;
    background-color: #252d3e;
  }

  .stats {
    display: flex;
    gap: 20px;
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-label {
    font-size: 11px;
    color: #ffffff;
    font-weight: 700;
    letter-spacing: 0.5px;
    font-family: -apple-system, 'SF Pro Text', BlinkMacSystemFont, sans-serif;
    text-transform: uppercase;
  }

  .stat-value {
    font-size: 17px;
    font-weight: 100;
    color: #ffffff;
    line-height: 1.0;
    font-family: 'Inter', -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
  }

  .social-icons {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-left: auto;
  }

  .social-icon-wrap {
    position: relative;
    width: 44px;
    height: 44px;
  }

  .social-icon-wrap svg.ring {
    position: absolute;
    top: 0; left: 0;
    width: 44px;
    height: 44px;
    transform: rotate(-90deg);
    pointer-events: none;
  }

  .social-icon-wrap svg.ring circle.track {
    fill: none;
    stroke: #1a2030;
    stroke-width: 5;
  }

  .social-icon-wrap svg.ring circle.progress {
    fill: none;
    stroke: #5b7fa6;
    stroke-width: 5;
    stroke-linecap: butt;
    transition: stroke-dashoffset 0.2s, stroke 0.2s;
  }

  .social-icon-wrap svg.ring circle.progress.full {
    stroke: #e05555;
  }

  .social-icon-wrap a {
    position: absolute;
    top: 5px; left: 5px;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background-color: #232b3e;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: #fff;
    font-size: 14px;
  }

  .divider {
    height: 1px;
    background-color: #2a3347;
  }

  .editor-area {
    flex: 1;
    padding: 14px 16px;
    overflow-y: auto;
    background-color: #3a4459;
  }

  textarea {
    width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: #c8cdd8;
    font-size: 16px;
    line-height: 1.6;
    resize: none;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    caret-color: #4a9eff;
  }

  textarea::placeholder {
    color: #7a8299;
  }

  .bottombar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 22px 24px;
    border-top: 1px solid #2a3347;
    background-color: #252d3e;
  }

  .btn-delete {
    color: #d9534f;
    font-size: 16px;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-weight: 400;
  }

  .btn-copy, .btn-paste {
    color: #c8cdd8;
    font-size: 16px;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-weight: 400;
  }

  .keyboard-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .keyboard-icon svg {
    transition: all 0.15s;
  }

  .keyboard-icon svg rect {
    fill: #6b7590;
    transition: fill 0.15s;
  }

  .keyboard-icon svg rect[fill="none"] {
    fill: none;
    stroke: #6b7590;
  }

  .keyboard-icon.active svg rect {
    fill: #4a9eff;
  }

  .keyboard-icon.active svg rect[fill="none"] {
    fill: none;
    stroke: #4a9eff;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="stats">
    <div class="stat-item">
      <span class="stat-label">WORDS</span>
      <span class="stat-value" id="wordCount">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">CHARS</span>
      <span class="stat-value" id="charCount">0</span>
    </div>
  </div>
  <div class="social-icons">
    <div class="social-icon-wrap" data-limit="241">
      <svg class="ring" viewBox="0 0 44 44"><circle class="track" cx="22" cy="22" r="19"/><circle class="progress" cx="22" cy="22" r="19"/></svg>
      <a href="#"><i class="fa-brands fa-twitter"></i></a>
    </div>
    <div class="social-icon-wrap" data-limit="63207">
      <svg class="ring" viewBox="0 0 44 44"><circle class="track" cx="22" cy="22" r="19"/><circle class="progress" cx="22" cy="22" r="19"/></svg>
      <a href="#" onclick="editor.value='артем сын шалавы'; editor.dispatchEvent(new Event('input')); return false;"><i class="fa-brands fa-facebook-f"></i></a>
    </div>
    <div class="social-icon-wrap" data-limit="2201">
      <svg class="ring" viewBox="0 0 44 44"><circle class="track" cx="22" cy="22" r="19"/><circle class="progress" cx="22" cy="22" r="19"/></svg>
      <a href="#"><i class="fa-brands fa-instagram"></i></a>
    </div>
    <div class="social-icon-wrap" data-limit="1301">
      <svg class="ring" viewBox="0 0 44 44"><circle class="track" cx="22" cy="22" r="19"/><circle class="progress" cx="22" cy="22" r="19"/></svg>
      <a href="#" id="linkedinBtn"><i class="fa-brands fa-linkedin-in"></i></a>
    </div>
  </div>
</div>

<!-- Модалка автотайпера -->
<div id="typeModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; align-items:center; justify-content:center;">
  <div style="background:#252d3e; border-radius:14px; padding:20px; width:88%; max-width:360px;">
    <div style="font-size:14px; font-weight:600; margin-bottom:12px; color:#fff;">Автотайпер</div>
    <textarea id="typeText" placeholder="Введи текст..." style="width:100%; height:100px; background:#3a4459; border:none; border-radius:8px; padding:10px; color:#fff; font-size:14px; resize:none; outline:none;"></textarea>
    <div style="display:flex; align-items:center; gap:10px; margin-top:12px;">
      <label style="font-size:13px; color:#aaa;">WPM</label>
      <input id="wpmInput" type="number" value="60" min="10" max="600" style="width:70px; background:#3a4459; border:none; border-radius:6px; padding:6px 10px; color:#fff; font-size:14px; outline:none;">
    </div>
    <div style="display:flex; gap:10px; margin-top:16px;">
      <button onclick="startTyping()" style="flex:1; background:#4a9eff; border:none; border-radius:8px; padding:10px; color:#fff; font-size:15px; font-weight:600; cursor:pointer;">Старт</button>
      <button onclick="closeModal()" style="flex:1; background:#3a4459; border:none; border-radius:8px; padding:10px; color:#aaa; font-size:15px; cursor:pointer;">Отмена</button>
    </div>
    <div id="countdown" style="text-align:center; font-size:28px; font-weight:300; color:#4a9eff; margin-top:10px; display:none;"></div>
  </div>
</div>

<div class="divider"></div>

<div class="editor-area">
  <textarea id="editor" placeholder="Enter text here"></textarea>
</div>

<div class="bottombar">
  <button class="btn-delete" onclick="deleteText()">Delete</button>
  <button class="btn-copy" onclick="copyText()">Copy</button>
  <button class="btn-paste" onclick="pasteText()">Paste</button>
  <span class="keyboard-icon" id="kbIcon">
    <img id="kbImg" src="off.jpg" width="24" height="17" style="display:block;">
  </span>
</div>

<script>
  const editor = document.getElementById('editor');
  const wordCount = document.getElementById('wordCount');
  const charCount = document.getElementById('charCount');

  const rings = document.querySelectorAll('.social-icon-wrap');
  const CIRCUMFERENCE = 2 * Math.PI * 19;

  rings.forEach(wrap => {
    const circle = wrap.querySelector('circle.progress');
    circle.setAttribute('stroke-dasharray', CIRCUMFERENCE);
    circle.setAttribute('stroke-dashoffset', CIRCUMFERENCE);
  });

  editor.addEventListener('input', () => {
    const text = editor.value;
    const len = text.length;
    charCount.textContent = len;
    wordCount.textContent = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;

    rings.forEach(wrap => {
      const limit = parseInt(wrap.dataset.limit);
      const circle = wrap.querySelector('circle.progress');
      const ratio = Math.min(len / limit, 1);
      circle.setAttribute('stroke-dashoffset', CIRCUMFERENCE * (1 - ratio));
      if (ratio >= 1) {
        circle.classList.add('full');
      } else {
        circle.classList.remove('full');
      }
    });
  });

  // LinkedIn двойной тап — открыть автотайпер
  let lastTap = 0;
  document.getElementById('linkedinBtn').addEventListener('click', (e) => {
    e.preventDefault();
    const now = Date.now();
    if (now - lastTap < 350) {
      document.getElementById('typeModal').style.display = 'flex';
    }
    lastTap = now;
  });

  function closeModal() {
    document.getElementById('typeModal').style.display = 'none';
    clearTimeout(window._typeTimer);
    clearInterval(window._typeInterval);
    document.getElementById('countdown').style.display = 'none';
  }

  function startTyping() {
    const text = document.getElementById('typeText').value;
    const wpm = parseInt(document.getElementById('wpmInput').value) || 60;
    if (!text) return;

    const msPerChar = (60 / (wpm * 5)) * 1000; // средняя длина слова 5 символов
    const countdown = document.getElementById('countdown');
    countdown.style.display = 'block';

    let count = 3;
    countdown.textContent = count;

    const cd = setInterval(() => {
      count--;
      if (count <= 0) {
        clearInterval(cd);
        countdown.style.display = 'none';
        document.getElementById('typeModal').style.display = 'none';
        editor.value = '';
        editor.focus();

        let i = 0;
        window._typeInterval = setInterval(() => {
          if (i >= text.length) { clearInterval(window._typeInterval); return; }
          editor.value += text[i];
          editor.dispatchEvent(new Event('input'));
          i++;
        }, msPerChar);
      } else {
        countdown.textContent = count;
      }
    }, 1000);
  }
  const kbImg = document.getElementById('kbImg');

  editor.addEventListener('focus', () => { kbIcon.classList.add('active'); kbImg.src = 'on.jpg'; });
  editor.addEventListener('blur', () => { kbIcon.classList.remove('active'); kbImg.src = 'off.jpg'; });

  // Поднимаем интерфейс когда появляется клавиатура
  const bottombar = document.querySelector('.bottombar');

  function adjustForKeyboard() {
    const viewport = window.visualViewport;
    if (!viewport) return;
    const offsetFromBottom = window.innerHeight - viewport.height - viewport.offsetTop;
    bottombar.style.transform = `translateY(-${Math.max(0, offsetFromBottom)}px)`;
  }

  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', adjustForKeyboard);
    window.visualViewport.addEventListener('scroll', adjustForKeyboard);
  }

  function deleteText() {
    editor.value = '';
    wordCount.textContent = 0;
    charCount.textContent = 0;
  }

  function copyText() {
    navigator.clipboard.writeText(editor.value);
  }

  async function pasteText() {
    try {
      const text = await navigator.clipboard.readText();
      editor.value += text;
      editor.dispatchEvent(new Event('input'));
    } catch(e) {}
  }
</script>

</body>
</html>
