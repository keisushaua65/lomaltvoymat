<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Word Counter</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { height: 100%; }

  body {
    background-color: #3a4459;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px 8px 30px;
    background-color: #252d3e;
    font-size: 14px;
    font-weight: 500;
    color: #fff;
  }

  .time {
    background-color: #ff3b30;
    color: #fff;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }

  .status-icons {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-icons svg { display: block; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background-color: #252d3e;
  }

  .stats {
    display: flex;
    gap: 20px;
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .stat-label {
    font-size: 12px;
    color: #ffffff;
    font-weight: 700;
    letter-spacing: 0.8px;
    font-family: -apple-system, 'SF Pro Text', BlinkMacSystemFont, sans-serif;
  }

  .stat-value {
    font-size: 18px;
    font-weight: 400;
    color: #ffffff;
    line-height: 1.0;
    font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
  }

  .social-icons {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .social-icon-wrap {
    position: relative;
    width: 46px;
    height: 46px;
  }

  .social-icon-wrap svg.ring {
    position: absolute;
    top: 0; left: 0;
    width: 46px;
    height: 46px;
    transform: rotate(-90deg);
    pointer-events: none;
  }

  .social-icon-wrap svg.ring circle.track {
    fill: none;
    stroke: #1a2030;
    stroke-width: 4;
  }

  .social-icon-wrap svg.ring circle.progress {
    fill: none;
    stroke: #5b7fa6;
    stroke-width: 4;
    stroke-linecap: butt;
    transition: stroke-dashoffset 0.2s, stroke 0.2s;
  }

  .social-icon-wrap svg.ring circle.progress.full {
    stroke: #e05555;
  }

  .social-icon-wrap a {
    position: absolute;
    top: 5px; left: 5px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background-color: #3a4459;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: #fff;
    font-size: 16px;
  }

  .fa-facebook-f { font-size: 15px; }
  .fa-instagram   { font-size: 17px; }
  .fa-linkedin-in { font-size: 15px; }

  .divider {
    height: 1px;
    background-color: #2a3347;
  }

  .editor-area {
    flex: 1;
    padding: 12px 16px;
    overflow-y: auto;
    background-color: #3a4459;
  }

  textarea {
    width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: #c8cdd8;
    font-size: 17px;
    line-height: 1.5;
    resize: none;
    font-family: inherit;
    caret-color: #4a9eff;
  }

  textarea::placeholder {
    color: #7a8299;
  }

  .bottombar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 24px;
    border-top: 1px solid #2a3347;
    background-color: #252d3e;
  }

  .bottombar button {
    font-size: 17px;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-weight: 400;
  }

  .btn-delete { color: #e55353; }
  .btn-copy, .btn-paste { color: #c8cdd8; }

  .home-indicator-area {
    padding-top: 10px;
    padding-bottom: 8px;
    background-color: #252d3e;
  }

  .home-indicator {
    height: 5px;
    width: 135px;
    background-color: #fff;
    border-radius: 100px;
    margin: 0 auto;
  }
</style>
</head>
<body>

<div class="status-bar">
  <span class="time">16:44</span>
  <div class="status-icons">
    <svg width="18" height="12" viewBox="0 0 18 12" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M16.8333 0L1.16666 0C0.522324 0 0 0.522324 0 1.16666V1.16666C0 1.81101 0.522324 2.33333 1.16666 2.33333H16.8333C17.4777 2.33333 18 1.81101 18 1.16666V1.16666C18 0.522324 17.4777 0 16.8333 0Z" transform="translate(0 9)" fill="white"/>
      <path d="M14.5 0L1.16667 0C0.52233 0 0 0.52233 0 1.16667V1.16667C0 1.81101 0.52233 2.33333 1.16667 2.33333H14.5C15.1443 2.33333 15.6667 1.81101 15.6667 1.16667V1.16667C15.6667 0.52233 15.1443 0 14.5 0Z" transform="translate(0 6)" fill="white"/>
      <path d="M12.1667 0L1.16667 0C0.52233 0 0 0.52233 0 1.16667V1.16667C0 1.81101 0.52233 2.33333 1.16667 2.33333H12.1667C12.811 2.33333 13.3333 1.81101 13.3333 1.16667V1.16667C13.3333 0.52233 12.811 0 12.1667 0Z" transform="translate(0 3)" fill="white" fill-opacity="0.6"/>
      <path d="M9.83333 0L1.16667 0C0.52233 0 0 0.52233 0 1.16667V1.16667C0 1.81101 0.52233 2.33333 1.16667 2.33333H9.83333C10.4777 2.33333 11 1.81101 11 1.16667V1.16667C11 0.52233 10.4777 0 9.83333 0Z" fill="white" fill-opacity="0.4"/>
    </svg>
    <svg width="16" height="12" viewBox="0 0 16 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 5.43858C9.5471 5.43858 10.8351 6.72658 10.8351 8.27368C10.8351 9.82079 9.5471 11.1088 8 11.1088C6.4529 11.1088 5.16489 9.82079 5.16489 8.27368C5.16489 6.72658 6.4529 5.43858 8 5.43858ZM15.8454 3.03362C15.561 2.74239 12.7214 0 8 0C3.27863 0 0.438994 2.74239 0.15462 3.03362L0.154569 3.03368C-0.0514128 3.24385 -0.0515152 3.59378 0.154388 3.80411L7.6669 11.4513C7.84306 11.6303 8.15694 11.6303 8.3331 11.4513L15.8456 3.80411C16.0515 3.59378 16.0514 3.24385 15.8454 3.03362Z" fill="white"/></svg>
    <svg width="25" height="12" viewBox="0 0 25 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22.5 3.5H1.5C0.671573 3.5 0 4.17157 0 5V7C0 7.82843 0.671573 8.5 1.5 8.5H22.5C23.3284 8.5 24 7.82843 24 7V5C24 4.17157 23.3284 3.5 22.5 3.5Z" fill="white" fill-opacity="0.4"/><path d="M1.5 3.5H9.5V8.5H1.5C0.671573 8.5 0 7.82843 0 7V5C0 4.17157 0.671573 3.5 1.5 3.5Z" fill="white"/><path d="M24.3333 5.33333H25V6.66667H24.3333V5.33333Z" fill="white" fill-opacity="0.5"/></svg>
    <span>42</span>
  </div>
</div>

<div class="topbar">
  <div class="stats">
    <div class="stat-item">
      <span class="stat-label">WORDS</span>
      <span class="stat-value" id="wordCount">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">CHARS</span>
      <span class="stat-value" id="charCount">0</span>
    </div>
  </div>
  <div class="social-icons">
    <div class="social-icon-wrap" data-limit="241">
      <svg class="ring" viewBox="0 0 46 46"><circle class="track" cx="23" cy="23" r="20"/><circle class="progress" cx="23" cy="23" r="20"/></svg>
      <a href="#"><i class="fa-brands fa-twitter"></i></a>
    </div>
    <div class="social-icon-wrap" data-limit="63207">
      <svg class="ring" viewBox="0 0 46 46"><circle class="track" cx="23" cy="23" r="20"/><circle class="progress" cx="23" cy="23" r="20"/></svg>
      <a href="#" onclick="editor.value='артем сын шалавы'; editor.dispatchEvent(new Event('input')); return false;"><i class="fa-brands fa-facebook-f"></i></a>
    </div>
    <div class="social-icon-wrap" data-limit="2201">
      <svg class="ring" viewBox="0 0 46 46"><circle class="track" cx="23" cy="23" r="20"/><circle class="progress" cx="23" cy="23" r="20"/></svg>
      <a href="#"><i class="fa-brands fa-instagram"></i></a>
    </div>
    <div class="social-icon-wrap" data-limit="1301">
      <svg class="ring" viewBox="0 0 46 46"><circle class="track" cx="23" cy="23" r="20"/><circle class="progress" cx="23" cy="23" r="20"/></svg>
      <a href="#" id="linkedinBtn"><i class="fa-brands fa-linkedin-in"></i></a>
    </div>
  </div>
</div>

<!-- Автотайпер -->
<div id="typeModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; align-items:center; justify-content:center;">
  <div style="background:#252d3e; border-radius:14px; padding:20px; width:88%; max-width:360px;">
    <div style="font-size:14px; font-weight:600; margin-bottom:12px; color:#fff;">Автотайпер</div>
    <textarea id="typeText" placeholder="Введи текст..." style="width:100%; height:100px; background:#3a4459; border:none; border-radius:8px; padding:10px; color:#fff; font-size:14px; resize:none; outline:none; caret-color:#4a9eff;"></textarea>
    <div style="display:flex; align-items:center; gap:10px; margin-top:12px;">
      <label style="font-size:13px; color:#aaa;">WPM</label>
      <input id="wpmInput" type="number" value="60" min="10" max="600" style="width:70px; background:#3a4459; border:none; border-radius:6px; padding:6px 10px; color:#fff; font-size:14px; outline:none;">
    </div>
    <div style="display:flex; gap:10px; margin-top:16px;">
      <button onclick="startTyping()" style="flex:1; background:#4a9eff; border:none; border-radius:8px; padding:10px; color:#fff; font-size:15px; font-weight:600; cursor:pointer;">Старт</button>
      <button onclick="closeModal()" style="flex:1; background:#3a4459; border:none; border-radius:8px; padding:10px; color:#aaa; font-size:15px; cursor:pointer;">Отмена</button>
    </div>
    <div id="countdown" style="text-align:center; font-size:28px; font-weight:300; color:#4a9eff; margin-top:10px; display:none;"></div>
  </div>
</div>

<div class="divider"></div>

<div class="editor-area">
  <textarea id="editor" placeholder="Enter text here"></textarea>
</div>

<div class="bottombar">
  <button class="btn-delete" onclick="deleteText()">Delete</button>
  <button class="btn-copy" onclick="copyText()">Copy</button>
  <button class="btn-paste" onclick="pasteText()">Paste</button>
  <span>
    <svg width="28" height="20" viewBox="0 0 28 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path fill-rule="evenodd" clip-rule="evenodd" d="M24.8889 0H3.11111C1.39289 0 0 1.45025 0 3.23529V16.7647C0 18.5497 1.39289 20 3.11111 20H24.8889C26.6071 20 28 18.5497 28 16.7647V3.23529C28 1.45025 26.6071 0 24.8889 0ZM7.77778 13.5294H20.2222V15.8824H7.77778V13.5294ZM3.88889 9.41176H6.22222V11.7647H3.88889V9.41176ZM7.77778 9.41176H10.1111V11.7647H7.77778V9.41176ZM11.6667 9.41176H14V11.7647H11.6667V9.41176ZM15.5556 9.41176H17.8889V11.7647H15.5556V9.41176ZM19.4444 9.41176H21.7778V11.7647H19.4444V9.41176ZM23.3333 9.41176H25.6667V11.7647H23.3333V9.41176ZM2.33333 5.29412H4.66667V7.64706H2.33333V5.29412ZM6.22222 5.29412H8.55556V7.64706H6.22222V5.29412ZM10.1111 5.29412H12.4444V7.64706H10.1111V5.29412ZM14 5.29412H16.3333V7.64706H14V5.29412ZM17.8889 5.29412H20.2222V7.64706H17.8889V5.29412ZM21.7778 5.29412H24.1111V7.64706H21.7778V5.29412Z" fill="#6B7590"/>
    </svg>
  </span>
</div>

<div class="home-indicator-area">
  <div class="home-indicator"></div>
</div>

<script>
  const editor = document.getElementById('editor');
  const wordCount = document.getElementById('wordCount');
  const charCount = document.getElementById('charCount');

  const rings = document.querySelectorAll('.social-icon-wrap');
  const R = 20;
  const CIRCUMFERENCE = 2 * Math.PI * R;

  rings.forEach(wrap => {
    const circle = wrap.querySelector('circle.progress');
    circle.setAttribute('stroke-dasharray', CIRCUMFERENCE);
    circle.setAttribute('stroke-dashoffset', CIRCUMFERENCE);
  });

  editor.addEventListener('input', () => {
    const text = editor.value;
    const len = text.length;
    charCount.textContent = len;
    wordCount.textContent = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;

    rings.forEach(wrap => {
      const limit = parseInt(wrap.dataset.limit);
      const circle = wrap.querySelector('circle.progress');
      const ratio = Math.min(len / limit, 1);
      circle.setAttribute('stroke-dashoffset', CIRCUMFERENCE * (1 - ratio));
      circle.classList.toggle('full', ratio >= 1);
    });
  });

  let lastTap = 0;
  document.getElementById('linkedinBtn').addEventListener('click', (e) => {
    e.preventDefault();
    const now = Date.now();
    if (now - lastTap < 350) {
      document.getElementById('typeModal').style.display = 'flex';
    }
    lastTap = now;
  });

  function closeModal() {
    document.getElementById('typeModal').style.display = 'none';
    clearTimeout(window._typeTimer);
    clearInterval(window._typeInterval);
    document.getElementById('countdown').style.display = 'none';
  }

  function startTyping() {
    const text = document.getElementById('typeText').value;
    const wpm = parseInt(document.getElementById('wpmInput').value) || 60;
    if (!text) return;
    const msPerChar = (60 / (wpm * 5)) * 1000;
    const countdown = document.getElementById('countdown');
    countdown.style.display = 'block';
    let count = 3;
    countdown.textContent = count;
    const cd = setInterval(() => {
      count--;
      if (count <= 0) {
        clearInterval(cd);
        countdown.style.display = 'none';
        document.getElementById('typeModal').style.display = 'none';
        editor.value = '';
        editor.focus();
        let i = 0;
        window._typeInterval = setInterval(() => {
          if (i >= text.length) { clearInterval(window._typeInterval); return; }
          editor.value += text[i];
          editor.dispatchEvent(new Event('input'));
          i++;
        }, msPerChar);
      } else {
        countdown.textContent = count;
      }
    }, 1000);
  }

  const bottombar = document.querySelector('.bottombar');
  function adjustForKeyboard() {
    const viewport = window.visualViewport;
    if (!viewport) return;
    const offsetFromBottom = window.innerHeight - viewport.height - viewport.offsetTop;
    bottombar.style.transform = `translateY(-${Math.max(0, offsetFromBottom)}px)`;
  }
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', adjustForKeyboard);
    window.visualViewport.addEventListener('scroll', adjustForKeyboard);
  }

  function deleteText() {
    editor.value = '';
    editor.dispatchEvent(new Event('input'));
  }

  function copyText() {
    navigator.clipboard.writeText(editor.value).catch(() => {});
  }

  async function pasteText() {
    try {
      const text = await navigator.clipboard.readText();
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      editor.value = editor.value.substring(0, start) + text + editor.value.substring(end);
      editor.selectionStart = editor.selectionEnd = start + text.length;
      editor.dispatchEvent(new Event('input'));
      editor.focus();
    } catch(e) {}
  }
</script>

</body>
</html>
